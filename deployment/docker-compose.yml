# =============================================================================
# JalanCerdas AI - Docker Compose Deployment
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: jalancerdas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jalancerdas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jalancerdas_secret}
      POSTGRES_DB: ${POSTGRES_DB:-jalancerdas_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jalancerdas} -d ${POSTGRES_DB:-jalancerdas_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - jalancerdas-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ---------------------------------------------------------------------------
  # MinIO Object Storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: jalancerdas-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - jalancerdas-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ---------------------------------------------------------------------------
  # MinIO Init — Creates the required bucket on startup
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: jalancerdas-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing myminio/${MINIO_BUCKET:-road-detections};
        echo 'Bucket ${MINIO_BUCKET:-road-detections} created successfully';
      "
    networks:
      - jalancerdas-network

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: jalancerdas-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://jalancerdas:jalancerdas_secret@postgres:5432/jalancerdas_db}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-road-detections}
      MINIO_SECURE: "false"
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-random-secret-key-in-production}
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRE_MINUTES: "1440"
      APP_NAME: "JalanCerdas AI"
      APP_VERSION: "1.0.0"
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - jalancerdas-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  # ---------------------------------------------------------------------------
  # Next.js Dashboard
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: jalancerdas-dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NODE_ENV: "production"
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - jalancerdas-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: jalancerdas-nginx
    restart: unless-stopped
    ports:
      - "8888:80"
      - "4443:443"
    depends_on:
      - backend
      - dashboard
      - minio
    networks:
      - jalancerdas-network

# =============================================================================
# Networks
# =============================================================================
networks:
  jalancerdas-network:
    driver: bridge
    name: jalancerdas-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: jalancerdas-postgres-data
    driver: local
  minio_data:
    name: jalancerdas-minio-data
    driver: local
