# JalanCerdas AI - YOLO Dataset Configuration
# 6-class road damage detection (kerusakan jalan)

# Path to dataset root directory
# Adjust based on where your dataset is located:
#   - Local: ../dataset
#   - Kaggle: /content/dataset
#   - Colab: /content/dataset
path: ../dataset
train: train/images
val: val/images
test: test/images

# Number of classes
nc: 6

# Class names — order must match training labels
names:
  0: retak_memanjang              # Longitudinal crack
  1: pengelupasan_lapisan_permukaan  # Surface peeling
  2: lubang                       # Pothole
  3: retak_kulit_buaya            # Alligator crack
  4: retak_blok                   # Block crack
  5: retak_pinggir                # Edge crack
